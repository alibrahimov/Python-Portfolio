name: Quant Infrastructure CI

# This tells GitHub to run the test every time you push code to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Download your code onto the GitHub server
    - uses: actions/checkout@v4

    # 2. Install Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    # 3. Install the required mathematical libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas scipy matplotlib

    # 4. Run the automated unit test
    - name: Run Black-Scholes Unit Test
      run: |
        cd Stochastic_Pricing_Engine
        python -m unittest test_pricer.py
